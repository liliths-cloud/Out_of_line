<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Mein 3D-Modell</title>

  <script type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
  </script>

  <style>
    body{
      margin:0;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
      align-items:center;
      height:100vh;
      font-family:Arial,sans-serif;
    }

    model-viewer{
      width:100%;
      height:100%;
    }
  </style>
</head>

<body>

<model-viewer
    src="VR_V3.glb"
    ios-src="VR_V8.usdz"
    ar
    ar-modes="scene-viewer quick-look webxr"
    camera-controls
    auto-rotate
    shadow-intensity="1">

    <button slot="ar-button">
        📱 In AR ansehen
    </button>

</model-viewer>

</body>
</html>
