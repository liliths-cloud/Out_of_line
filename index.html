<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Out of Line – AR Experience</title>

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:Arial, Helvetica, sans-serif;

    background:linear-gradient(180deg,#f8f8f8,#e8e8e8);

    overflow:hidden;

}

model-viewer{

    width:100vw;
    height:100vh;

    --poster-color: transparent;

}

/* großer AR Button */

.ar-button{

    position:absolute;

    left:50%;
    bottom:35px;

    transform:translateX(-50%);

    background:white;

    color:#005eff;

    border:none;

    padding:20px 42px;

    font-size:24px;

    font-weight:bold;

    border-radius:60px;

    box-shadow:
        0 10px 25px rgba(0,0,0,.18);

    transition:.25s;

    cursor:pointer;

}

.ar-button:hover{

    transform:translateX(-50%) scale(1.05);

}

.ar-button:active{

    transform:translateX(-50%) scale(.98);

}

/* Titel */

.title{

    position:absolute;

    width:100%;

    top:30px;

    text-align:center;

    font-size:32px;

    font-weight:700;

    color:#222;

    pointer-events:none;

}

.subtitle{

    position:absolute;

    width:100%;

    top:72px;

    text-align:center;

    color:#666;

    font-size:18px;

    pointer-events:none;

}

</style>

</head>

<body>

<div class="title">
Out of Line
</div>

<div class="subtitle">
Scanne den QR-Code und platziere das Objekt in deinem Raum.
</div>

<model-viewer

src="VR_V3.glb"

ios-src="VR_V8.usdz"

ar

ar-modes="scene-viewer quick-look webxr"

camera-controls

auto-rotate

shadow-intensity="1.3"

exposure="1.1"

camera-orbit="0deg 75deg auto"

field-of-view="30deg"

>

<button slot="ar-button" class="ar-button">

📱 In AR ansehen

</button>

</model-viewer>

</body>

</html>
